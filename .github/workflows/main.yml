name: build-win64

on:
  watch:
    types: [started]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable

    - run: cargo build --release

    - uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: target/release/*.exe
